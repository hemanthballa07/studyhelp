spring:
  application:
    name: studyhelp
  datasource:
    # DB_URL is supplied as a bare postgresql:// URL (see .env.example); prefix to make it a JDBC URL.
    url: jdbc:${DB_URL:postgresql://localhost:5432/studyhelp}
    username: ${DB_USER:studyhelp}
    password: ${DB_PASSWORD:changeme}
    hikari:
      # Don't fail app startup if the DB is briefly unavailable; health will report DOWN until it's up.
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates the entity-to-table mapping.
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: platform-dispatcher
      auto-offset-reset: earliest
    producer:
      acks: all
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

platform:
  integrity:
    judge:
      sample-rate: 0.10
  ai:
    confidence:
      tau-high: 0.82
      tau-low: 0.65
      weights:
        groundedness: 0.35
        consistency: 0.20
        structural: 0.20
        domain-verifier: 0.25

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  metrics:
    distribution:
      percentiles-histogram:
        ai.pipeline.latency: true
        ai.retrieve.latency:  true
        ai.generate.latency:  true
        ai.verify.latency:    true
        ai.decide.latency:    true
        http.server.requests: true
      slo:
        ai.pipeline.latency: 2s, 5s, 8s, 15s
        ai.retrieve.latency: 1s, 2s, 5s
        ai.generate.latency: 2s, 5s, 10s
        ai.verify.latency:   1s, 3s, 8s
        ai.decide.latency:   100ms, 500ms, 1s
    tags:
      application: studyhelp
