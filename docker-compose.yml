# Local dev infra for the walking skeleton. Credentials here are local-only defaults
# matching .env.example — never real secrets.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: studyhelp
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: studyhelp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyhelp -d studyhelp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
