global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: studyhelp
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets:
          - host.docker.internal:8080
    metric_relabel_configs:
      # Drop any series carrying a high-cardinality exception label (cardinality rule §11.2).
      - source_labels: [exception]
        regex: ".+"
        action: drop
